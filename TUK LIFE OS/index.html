<html lang="th">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>TUK LIFE OS v5.2 Mobile PWA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07111f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{
 --bg:#07111f;--panel:#0e1b2f;--panel2:#12233b;--text:#eef6ff;--muted:#91a4bd;
 --brand:#4fd1c5;--brand2:#8b5cf6;--danger:#fb7185;--warn:#fbbf24;--ok:#34d399;
 --line:rgba(255,255,255,.08);--shadow:0 20px 60px rgba(0,0,0,.35);--radius:22px
}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:
radial-gradient(circle at top left,rgba(79,209,197,.25),transparent 30%),
radial-gradient(circle at top right,rgba(139,92,246,.22),transparent 32%),var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}
.app{min-height:100vh;display:grid;grid-template-columns:290px 1fr}
.sidebar{padding:20px;border-right:1px solid var(--line);background:rgba(7,17,31,.72);backdrop-filter:blur(18px);position:sticky;top:0;height:100vh;overflow:auto}
.logo{display:flex;gap:12px;align-items:center;margin-bottom:22px}.logo .mark{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;font-weight:900}
.nav{display:grid;gap:8px}.nav button{padding:13px 14px;border-radius:16px;text-align:left;color:var(--muted);background:transparent}.nav button.active,.nav button:hover{background:rgba(255,255,255,.08);color:var(--text)}
.main{padding:26px;max-width:1280px;width:100%;margin:auto}.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:20px}.title h1{margin:0;font-size:32px}.title p{margin:7px 0 0;color:var(--muted)}
.grid{display:grid;gap:16px}.cols4{grid-template-columns:repeat(4,1fr)}.cols3{grid-template-columns:repeat(3,1fr)}.cols2{grid-template-columns:repeat(2,1fr)}
.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.kpi .label{color:var(--muted);font-size:13px}.kpi .value{font-size:28px;font-weight:800;margin-top:8px}.kpi .sub{color:var(--muted);font-size:13px;margin-top:5px}
.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{padding:11px 14px;border-radius:14px;background:rgba(255,255,255,.1);color:var(--text)}.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));font-weight:800}.btn.danger{background:rgba(251,113,133,.18);color:#fecdd3}
.input,textarea,select{width:100%;padding:12px 13px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.18);color:var(--text);outline:none}textarea{min-height:90px}
.form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.form .full{grid-column:1/-1}
.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:11px;text-align:left}.table th{color:var(--muted);font-size:13px}.pill{display:inline-flex;padding:5px 9px;border-radius:999px;background:rgba(79,209,197,.12);color:#99f6e4;font-size:12px}
.timeline{display:grid;gap:10px}.event{display:grid;grid-template-columns:82px 1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.05)}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:88px;padding:9px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--line)}.day b{font-size:13px}.dots{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}.dot{width:8px;height:8px;border-radius:50%;background:var(--brand)}
.hidden{display:none!important}.photo{max-width:120px;border-radius:14px;margin-top:8px}.searchbar{display:flex;gap:10px}.searchbar input{min-width:280px}
.small{font-size:12px;color:var(--muted)}.divider{height:1px;background:var(--line);margin:14px 0}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:fixed;bottom:0;top:auto;height:auto;width:100%;z-index:10;display:flex;overflow:auto;padding:8px}.logo{display:none}.nav{display:flex}.nav button{white-space:nowrap}.main{padding:18px 14px 90px}.cols4,.cols3,.cols2{grid-template-columns:1fr}.form{grid-template-columns:1fr}.event{grid-template-columns:62px 1fr}.event .actions{grid-column:1/-1}.top{display:grid}.searchbar input{min-width:0}}

/* =========================
   V5.2 MOBILE PWA PATCH
   Non-destructive mobile upgrade from V5.1 Master
========================= */
html{height:100%;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{min-height:100%;overscroll-behavior-y:none;touch-action:manipulation}
button,.btn,.nav button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.mobileHeader{display:none}
.installBanner{position:fixed;left:14px;right:14px;bottom:92px;z-index:30;padding:14px;border-radius:20px;background:rgba(14,27,47,.96);border:1px solid var(--line);box-shadow:var(--shadow);display:none;align-items:center;justify-content:space-between;gap:12px}
.installBanner.show{display:flex}
.fab{position:fixed;right:18px;bottom:86px;width:58px;height:58px;border-radius:22px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;display:none;place-items:center;font-size:28px;font-weight:900;box-shadow:0 18px 45px rgba(79,209,197,.22);z-index:25}
.mobileOnly{display:none}
@media(max-width:900px){
 body{background:linear-gradient(180deg,#07111f 0%,#091a2f 100%);padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
 .app{display:block;min-height:100dvh}
 .mobileHeader{display:flex;position:sticky;top:0;z-index:20;align-items:center;justify-content:space-between;gap:12px;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;background:rgba(7,17,31,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
 .mobileHeader .brand{display:flex;align-items:center;gap:10px;font-weight:900}.mobileHeader .mark{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center}.mobileHeader .sub{font-size:11px;color:var(--muted);font-weight:500}
 .sidebar{position:fixed;left:0;right:0;bottom:0;top:auto;height:calc(72px + env(safe-area-inset-bottom));width:100%;z-index:30;display:block;overflow:hidden;padding:6px 6px calc(6px + env(safe-area-inset-bottom));border-right:0;border-top:1px solid var(--line);background:rgba(7,17,31,.93);backdrop-filter:blur(22px)}
 .logo{display:none}.nav{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(74px,1fr);gap:4px;overflow-x:auto;overflow-y:hidden;height:100%;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}
 .nav button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-align:center;padding:7px 5px;border-radius:18px;font-size:11px;line-height:1.1;min-width:70px;white-space:normal}.nav button.active{background:rgba(79,209,197,.16);box-shadow:inset 0 0 0 1px rgba(79,209,197,.18)}
 .main{padding:14px 12px calc(112px + env(safe-area-inset-bottom));max-width:760px}.top{margin-bottom:14px}.title h1{font-size:25px;letter-spacing:-.03em}.title p{font-size:13px;line-height:1.35}.top>.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.top>.actions .btn{width:100%;padding:12px 10px;font-size:13px}
 .card{border-radius:22px;padding:15px;box-shadow:0 14px 34px rgba(0,0,0,.24)}.kpi .value{font-size:25px}.grid{gap:12px}.cols4,.cols3,.cols2{grid-template-columns:1fr}.form{grid-template-columns:1fr}.input,textarea,select{font-size:16px;border-radius:16px;padding:13px}
 .actions{gap:8px}.btn{min-height:44px;padding:11px 13px;border-radius:16px}.event{grid-template-columns:56px 1fr;gap:10px;padding:12px}.event .actions{grid-column:1/-1}.calendar{gap:6px}.day{min-height:72px;border-radius:14px;padding:8px}.table{display:block;overflow-x:auto;white-space:nowrap}.searchbar{display:grid;grid-template-columns:1fr auto}.searchbar input{min-width:0}.fab{display:grid}.mobileOnly{display:block}.desktopOnly{display:none!important}
}

</style>
</head>
<body>
<div class="app">
<header class="mobileHeader"><div class="brand"><div class="mark">T</div><div>TUK LIFE OS<div class="sub">Mobile PWA • Google Sheets Ready</div></div></div><button class="btn" onclick="current='settings';render()">⚙️</button></header>
<aside class="sidebar">
 <div class="logo"><div class="mark">T</div><div><b>TUK LIFE OS</b><div class="small">v5.1 Patch + Google Sheets</div></div></div>
 <nav class="nav" id="nav"></nav>
</aside>
<main class="main">
 <div class="top">
  <div class="title"><h1 id="pageTitle">Home Dashboard</h1><p id="pageSub">AI-ready Life Database, Timeline, Calendar, Google Sheets Sync</p></div>
  <div class="actions"><button class="btn primary" onclick="quickAdd()">＋ Quick Add</button><button class="btn" onclick="exportBackup()">Export Backup</button><button class="btn" onclick="document.getElementById('importFile').click()">Import</button><input id="importFile" type="file" accept=".json" hidden onchange="importBackup(event)"/></div>
 </div>
 <section id="view"></section>
</main>
</div>
<script>
const MODULES=[
 ['home','🏠','Dashboard'],['vault','🧠','Life Vault'],['timeline','🕒','Timeline'],['calendar','📅','Calendar'],
 ['ai','🤖','AI Query'],['profile','👤','Profile'],['vehicles','🚗','Vehicles'],['health','❤️','Health'],
 ['finance','💰','Finance'],['work','🏭','Work'],['goals','🎯','Goals'],['documents','📄','Documents'],
 ['sync','☁️','Cloud & Sync'],['settings','⚙️','Settings'],['trash','🗑️','Trash']
];
const SYSTEM_MODULES=['home','vault','timeline','calendar','ai','sync','settings'];
const DEFAULT_DB={
 profile:[{id:'PRO-000001',type:'profile',system:false,createdAt:now(),updatedAt:now(),name:'Apirak Mueanmanas',nickname:'TUK',company:'Satys Electric',birthDate:'1990-11-24',blood:'O',height:'168 cm',phone:'',email:'apirakzaa@gmail.com',address:'',tags:'profile'}],
 vehicles:[{id:'VEH-000001',type:'vehicle',system:false,createdAt:now(),updatedAt:now(),name:'BYD Seal 7',brand:'BYD',model:'Seal 7',year:'2025',color:'Black',plate:'',mileage:'',taxDue:'',insuranceDue:'',note:'EV car',tags:'BYD, car'},
 {id:'VEH-000002',type:'vehicle',system:false,createdAt:now(),updatedAt:now(),name:'Honda City 2010',brand:'Honda',model:'City',year:'2010',color:'',plate:'',mileage:'',taxDue:'',insuranceDue:'',note:'Old car',tags:'Honda, car'}],
 health:[], finance:[], work:[], goals:[
 {id:'GOA-000001',type:'goal',system:false,createdAt:now(),updatedAt:now(),title:'ลดน้ำหนัก',current:'62.2',target:'60',unit:'kg',deadline:'',status:'active',tags:'health'},
 {id:'GOA-000002',type:'goal',system:false,createdAt:now(),updatedAt:now(),title:'ฝึกภาษาอังกฤษ',current:'B1',target:'B2',unit:'level',deadline:'2026-11-30',status:'active',tags:'english'}],
 documents:[], timeline:[], settings:{googleScriptUrl:'',driveFolderId:'',imageMaxKB:350,receiptMaxKB:700,autoCompress:true}, trash:[]
};
function now(){return new Date().toISOString()}
function today(){return new Date().toISOString().slice(0,10)}
function load(){return JSON.parse(localStorage.getItem('tukLifeOSv5')||'null')||structuredClone(DEFAULT_DB)}
function save(){localStorage.setItem('tukLifeOSv5',JSON.stringify(db)); render()}
let db=load(), current='home';
function id(prefix){return prefix+'-'+String(Date.now()).slice(-6)+'-'+Math.random().toString(36).slice(2,5).toUpperCase()}
function addTimeline(kind,title,refId,extra={}){db.timeline.unshift({id:id('TIM'),type:'timeline',system:false,createdAt:now(),updatedAt:now(),date:extra.date||today(),time:new Date().toTimeString().slice(0,5),kind,title,refId,note:extra.note||'',tags:extra.tags||kind,photo:extra.photo||''})}
function del(collection,itemId){const arr=db[collection];const i=arr.findIndex(x=>x.id===itemId);if(i<0)return;if(arr[i].system){alert('รายการมาตรฐานของระบบลบไม่ได้');return} if(confirm('ต้องการลบรายการนี้ใช่ไหม? รายการจะไปอยู่ Trash')){db.trash.unshift({...arr[i],deletedFrom:collection,deletedAt:now()});arr.splice(i,1);save()}}
function restore(trashId){const i=db.trash.findIndex(x=>x.id===trashId);if(i<0)return;const it=db.trash[i];const c=it.deletedFrom||'timeline';delete it.deletedFrom;delete it.deletedAt;db[c]=db[c]||[];db[c].unshift(it);db.trash.splice(i,1);save()}
function renderNav(){nav.innerHTML=MODULES.map(m=>`<button class="${current===m[0]?'active':''}" onclick="current='${m[0]}';render()">${m[1]} ${m[2]}</button>`).join('')}
function render(){renderNav(); const meta=MODULES.find(m=>m[0]===current);pageTitle.textContent=meta[2]; view.innerHTML=views[current]()}
function card(label,value,sub){return `<div class="card kpi"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub||''}</div></div>`}
function count(c){return Array.isArray(db[c])?db[c].length:0}
const views={
home:()=>`<div class="grid cols4">${card('Life Vault',count('profile')+count('vehicles')+count('goals'),'ข้อมูลชีวิตทั้งหมด')}${card('Vehicles',count('vehicles'),'รถที่บันทึกไว้')}${card('Timeline วันนี้',db.timeline.filter(x=>x.date===today()).length,'เหตุการณ์วันนี้')}${card('Goals',count('goals'),'เป้าหมายที่ติดตาม')}</div>
<div class="grid cols2" style="margin-top:16px"><div class="card"><h2>🤖 AI Summary</h2><p>วันนี้คุณมีรถ ${count('vehicles')} คัน, เป้าหมาย ${count('goals')} รายการ และ Timeline วันนี้ ${db.timeline.filter(x=>x.date===today()).length} รายการ</p><button class="btn primary" onclick="current='ai';render()">ถาม AI จากฐานข้อมูล</button></div>
<div class="card"><h2>➕ Quick Actions</h2><div class="actions"><button class="btn" onclick="addVehicle()">เพิ่มรถ</button><button class="btn" onclick="addFood()">บันทึกอาหาร</button><button class="btn" onclick="addExpense()">เพิ่มรายจ่าย</button><button class="btn" onclick="current='calendar';render()">ดูปฏิทิน</button></div></div></div>${views.timeline(true)}`,
vault:()=>`<div class="grid cols3">${['profile','vehicles','health','finance','work','goals','documents','timeline'].map(c=>card(c,count(c),'เชื่อม Timeline / Search / Google Sheets')).join('')}</div><div class="card" style="margin-top:16px"><h2>🔍 Universal Search</h2>${searchBox()}</div>`,
timeline:(compact=false)=>`<div class="card"><h2>🕒 Timeline ${compact?'ล่าสุด':''}</h2><div class="actions"><button class="btn primary" onclick="addTimelineManual()">＋ เพิ่ม Timeline</button></div><div class="timeline" style="margin-top:12px">${db.timeline.slice(0,compact?6:100).map(e=>`<div class="event"><div><b>${e.time}</b><div class="small">${e.date}</div></div><div><b>${e.title}</b><div class="small">${e.kind} • ${e.tags||''}</div>${e.photo?`<img class="photo" src="${e.photo}"/>`:''}</div><div class="actions"><button class="btn" onclick="editTimeline('${e.id}')">แก้ไข</button><button class="btn danger" onclick="del('timeline','${e.id}')">ลบ</button></div></div>`).join('')||'<p class="small">ยังไม่มี Timeline</p>'}</div></div>`,
calendar:()=>calendarView(),
ai:()=>`<div class="card"><h2>🤖 Ask Your Life Database</h2><p class="small">ตัวอย่าง: ฉันมีรถกี่คัน / รถของฉันมีอะไรบ้าง / เป้าหมายของฉัน / ที่อยู่ของฉัน</p><div class="searchbar"><input id="aiq" class="input" placeholder="ถาม AI จากข้อมูลของคุณ..."/><button class="btn primary" onclick="answerAI()">ถาม</button></div><div id="aians" style="margin-top:16px"></div></div>`,
profile:()=>crudView('profile',['name','nickname','company','birthDate','blood','height','phone','email','address','tags']),
vehicles:()=>`<div class="actions" style="margin-bottom:12px"><button class="btn primary" onclick="addVehicle()">＋ เพิ่มรถ</button></div>`+crudView('vehicles',['name','brand','model','year','color','plate','mileage','taxDue','insuranceDue','note','tags'],false),
health:()=>`<div class="actions" style="margin-bottom:12px"><button class="btn primary" onclick="addFood()">＋ บันทึกอาหาร/สุขภาพ</button></div>`+crudView('health',['date','category','name','calories','protein','carbs','fat','sugar','sodium','note','tags']),
finance:()=>`<div class="actions" style="margin-bottom:12px"><button class="btn primary" onclick="addExpense()">＋ เพิ่มรายรับ/รายจ่าย</button></div>`+crudView('finance',['date','type','category','title','amount','payment','note','tags']),
work:()=>crudView('work',['date','category','title','status','machine','supplier','po','note','tags']),
goals:()=>crudView('goals',['title','current','target','unit','deadline','status','tags']),
documents:()=>crudView('documents',['date','category','title','fileName','driveUrl','note','tags']),
sync:()=>`<div class="grid cols2"><div class="card"><h2>☁️ Google Sync</h2><label>Apps Script Web App URL</label><input class="input" value="${db.settings.googleScriptUrl||''}" onchange="db.settings.googleScriptUrl=this.value;save()"/><label>Google Drive Folder ID</label><input class="input" value="${db.settings.driveFolderId||''}" onchange="db.settings.driveFolderId=this.value;save()"/><div class="actions" style="margin-top:12px"><button class="btn primary" onclick="syncToSheets()">Sync Now</button><button class="btn" onclick="exportBackup()">Export Backup</button></div><p class="small">Google Sheets จะเป็น Source of Truth เมื่อเชื่อม Apps Script แล้ว</p></div><div class="card"><h2>🖼️ Image Compression Policy</h2><label>รูปทั่วไป Max KB</label><input class="input" type="number" value="${db.settings.imageMaxKB}" onchange="db.settings.imageMaxKB=+this.value;save()"/><label>ใบเสร็จ/เอกสาร Max KB</label><input class="input" type="number" value="${db.settings.receiptMaxKB}" onchange="db.settings.receiptMaxKB=+this.value;save()"/><p class="small">ระบบจะบีบอัดไฟล์ให้ความจุน้อย แต่ยังดูชัดพอสำหรับ OCR</p></div></div>`,
settings:()=>`<div class="card"><h2>⚙️ System Rules</h2><p>ข้อมูลผู้ใช้: เพิ่ม/ดู/แก้ไข/คัดลอก/ลบได้</p><p>ข้อมูลมาตรฐานระบบ: ลบไม่ได้ แต่ซ่อน/ปักหมุดได้</p><p>ลบแล้วเข้า Trash ก่อน สามารถ Restore ได้</p></div>`,
trash:()=>`<div class="card"><h2>🗑️ Trash</h2>${db.trash.map(x=>`<div class="event"><div>${x.deletedFrom||''}</div><div><b>${x.title||x.name||x.id}</b><div class="small">${x.deletedAt||''}</div></div><div><button class="btn" onclick="restore('${x.id}')">Restore</button></div></div>`).join('')||'<p class="small">Trash ว่าง</p>'}</div>`
};
function crudView(collection,fields){const rows=db[collection]||[];return `<div class="card"><div class="actions"><button class="btn primary" onclick="addGeneric('${collection}',${JSON.stringify(fields).replaceAll('"','&quot;')})">＋ เพิ่ม</button></div><div style="overflow:auto"><table class="table"><thead><tr>${fields.slice(0,6).map(f=>`<th>${f}</th>`).join('')}<th>จัดการ</th></tr></thead><tbody>${rows.map(r=>`<tr>${fields.slice(0,6).map(f=>`<td>${r[f]??''}</td>`).join('')}<td><button class="btn" onclick="editGeneric('${collection}','${r.id}',${JSON.stringify(fields).replaceAll('"','&quot;')})">แก้ไข</button> <button class="btn danger" onclick="del('${collection}','${r.id}')">ลบ</button></td></tr>`).join('')}</tbody></table></div></div>`}
function addGeneric(c,fields){let obj={id:id(c.slice(0,3).toUpperCase()),type:c,system:false,createdAt:now(),updatedAt:now()};fields.forEach(f=>obj[f]=prompt(f,'')||'');db[c].unshift(obj);addTimeline(c,`เพิ่ม ${obj.title||obj.name||c}`,obj.id,{tags:obj.tags});save()}
function editGeneric(c,itemId,fields){const obj=db[c].find(x=>x.id===itemId);fields.forEach(f=>obj[f]=prompt(f,obj[f]||'')??obj[f]);obj.updatedAt=now();addTimeline(c,`แก้ไข ${obj.title||obj.name||c}`,obj.id,{tags:obj.tags});save()}
function addVehicle(){addGeneric('vehicles',['name','brand','model','year','color','plate','mileage','taxDue','insuranceDue','note','tags'])}
function addExpense(){addGeneric('finance',['date','type','category','title','amount','payment','note','tags'])}
function addFood(){addGeneric('health',['date','category','name','calories','protein','carbs','fat','sugar','sodium','note','tags'])}
function addTimelineManual(){addGeneric('timeline',['date','time','kind','title','note','tags'])}
function editTimeline(i){editGeneric('timeline',i,['date','time','kind','title','note','tags'])}
function quickAdd(){let x=prompt('พิมพ์สิ่งที่ต้องการบันทึก เช่น กินข้าว 500 kcal / จ่าย 120 บาท / PM Machine');if(!x)return;addTimeline('quick',x,'',{tags:'quick'});save()}
function searchBox(){return `<div class="searchbar"><input id="q" class="input" placeholder="ค้นหา BYD, บ้าน, Gym, PO..."/><button class="btn primary" onclick="doSearch()">ค้นหา</button></div><div id="result" style="margin-top:12px"></div>`}

(function upgradeV51(){
  const extraModules=[['contacts','👥','Contacts'],['addresses','📍','Addresses'],['properties','🏠','Properties'],['chat','💬','Chat'],['media','🖼️','Media'],['calls','📞','Calls']];
  extraModules.forEach(m=>{ if(!MODULES.some(x=>x[0]===m[0])) MODULES.splice(MODULES.length-3,0,m); });
  const defaults={contacts:[],addresses:[],properties:[],chat:[],friends:[],media:[],calls:[],aiMemory:[]};
  Object.keys(defaults).forEach(k=>{ if(!db[k]) db[k]=defaults[k]; });
  db.settings={
    googleScriptUrl:'',driveFolderId:'',imageMaxKB:350,receiptMaxKB:700,documentMaxKB:900,autoCompress:true,
    voiceEnabled:true,voiceLanguage:'th-TH',speakReply:true,cameraAI:true,ocrMode:'manual-confirm',
    pinEnabled:false,faceIdEnabled:false,notificationEnabled:true,dashboardSimple:true,
    ...(db.settings||{})
  };
  db.profile=(db.profile||[]).map(p=>({photo:p.photo||'',addresses:p.addresses||'',emergencyContact:p.emergencyContact||'',...p}));
  if(!db.timeline) db.timeline=[];
  localStorage.setItem('tukLifeOSv5',JSON.stringify(db));
})();

function ensureArray(c){ if(!db[c]) db[c]=[]; return db[c]; }
function speak(text){ if(!db.settings.speakReply || !('speechSynthesis' in window)) return; const u=new SpeechSynthesisUtterance(String(text).replace(/<[^>]+>/g,'')); u.lang=db.settings.voiceLanguage||'th-TH'; speechSynthesis.cancel(); speechSynthesis.speak(u); }
function startVoiceInput(targetId='aiq'){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('เบราว์เซอร์นี้ยังไม่รองรับ Speech Recognition'); return; }
  const rec=new SR(); rec.lang=db.settings.voiceLanguage||'th-TH'; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult=e=>{ document.getElementById(targetId).value=e.results[0][0].transcript; if(targetId==='aiq') answerAI(); };
  rec.onerror=e=>alert('Voice error: '+e.error); rec.start();
}
async function compressImageFile(file,maxKB=350){
  return new Promise((resolve,reject)=>{
    const img=new Image(); const reader=new FileReader();
    reader.onload=()=>{ img.onload=()=>{
      const canvas=document.createElement('canvas'); let w=img.width,h=img.height; const maxSide=1600;
      if(Math.max(w,h)>maxSide){ const r=maxSide/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
      canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h);
      let q=.82, data=canvas.toDataURL('image/jpeg',q);
      while((data.length*0.75/1024)>maxKB && q>.35){ q-=.08; data=canvas.toDataURL('image/jpeg',q); }
      resolve({dataUrl:data,sizeKB:Math.round(data.length*0.75/1024),width:w,height:h,quality:Math.round(q*100)});
    }; img.onerror=reject; img.src=reader.result; }; reader.onerror=reject; reader.readAsDataURL(file);
  });
}
async function handleAICamera(ev){
  const file=ev.target.files[0]; if(!file) return;
  const mode=document.getElementById('cameraMode')?.value||'general';
  const max=mode==='receipt'?db.settings.receiptMaxKB:mode==='document'?db.settings.documentMaxKB:db.settings.imageMaxKB;
  const img=await compressImageFile(file,max);
  const media={id:id('MED'),type:'media',system:false,createdAt:now(),updatedAt:now(),date:today(),category:mode,fileName:file.name,sizeKB:img.sizeKB,width:img.width,height:img.height,quality:img.quality,dataUrl:img.dataUrl,tags:mode};
  ensureArray('media').unshift(media);
  document.getElementById('cameraPreview').innerHTML=`<img class="preview" src="${img.dataUrl}"><p class="small">Compressed: ${img.sizeKB} KB • ${img.width}x${img.height} • quality ${img.quality}%</p>`;
  if(mode==='food') saveFoodFromPhoto(media);
  else if(mode==='receipt') saveReceiptFromPhoto(media);
  else if(mode==='vehicle') saveVehiclePhoto(media);
  else if(mode==='work') saveWorkPhoto(media);
  else { addTimeline('media','บันทึกรูปภาพ',media.id,{photo:img.dataUrl,tags:'media,'+mode}); save(); }
}

const oldAnswerAI=answerAI;
answerAI=function(){
  const q=document.getElementById('aiq')?.value.toLowerCase()||''; let ans='';
  if(q.includes('รถ')) ans=`คุณมีรถทั้งหมด ${count('vehicles')} คัน<br>`+db.vehicles.map((v,i)=>`${i+1}. ${v.name} ${v.year||''} ${v.color||''} เลขทะเบียน ${v.plate||'-'}`).join('<br>');
  else if(q.includes('ที่อยู่')||q.includes('บ้านเลขที่')) ans=(db.addresses||[]).map((a,i)=>`${i+1}. ${a.name||a.title||'Address'}: ${a.address||a.detail||''}`).join('<br>') || db.profile.map(p=>`ที่อยู่: ${p.address||'ยังไม่ได้บันทึกที่อยู่'}`).join('<br>');
  else if(q.includes('กิน')||q.includes('แคล')) ans=`วันนี้บันทึกสุขภาพ/อาหาร ${db.health.filter(x=>x.date===today()).length} รายการ<br>`+db.health.filter(x=>x.date===today()).map(x=>`${x.name||x.title}: ${x.calories||0} kcal`).join('<br>');
  else if(q.includes('เงิน')||q.includes('จ่าย')) ans=`รายการการเงินทั้งหมด ${count('finance')} รายการ<br>`+db.finance.slice(0,5).map(x=>`${x.date||''} ${x.title||''} ${x.amount||''} บาท`).join('<br>');
  else if(q.includes('เป้าหมาย')) ans=db.goals.map(g=>`${g.title}: ${g.current}/${g.target} ${g.unit||''}`).join('<br>');
  else if(q.includes('timeline')||q.includes('วันนี้')) ans=db.timeline.filter(x=>x.date===today()).map(x=>`${x.time} ${x.title}`).join('<br>')||'วันนี้ยังไม่มี Timeline';
  else return oldAnswerAI();
  aians.innerHTML=`<div class="card">${ans}</div>`; speak(ans);
}
